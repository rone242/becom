name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Validate Build (sanity check on CI — doesn't push to VPS)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build all apps (API + Web + Analytics Router)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL:                        ${{ secrets.DATABASE_URL }}
          DIRECT_URL:                          ${{ secrets.DIRECT_URL }}
          JWT_SECRET:                          ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET:                     ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL:                        ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_API_URL:                 ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ANALYTICS_ROUTER_URL:    ${{ secrets.NEXT_PUBLIC_ANALYTICS_ROUTER_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER:         ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_GTM_ID:                  ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          SERVER_API_URL:                      ${{ secrets.SERVER_API_URL }}
          SERVER_ANALYTICS_ROUTER_URL:         ${{ secrets.SERVER_ANALYTICS_ROUTER_URL }}
          INTERNAL_API_KEY:                    ${{ secrets.INTERNAL_API_KEY }}
          R2_ACCOUNT_ID:                       ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:                    ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:                ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:                      ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:                       ${{ secrets.R2_PUBLIC_URL }}
          REDIS_URL:                           ${{ secrets.REDIS_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy Edge Worker to Cloudflare (optional — only if using the edge)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-edge:
    name: Deploy Edge Worker (Cloudflare)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install edge worker dependencies
        run: npm ci
        working-directory: apps/analytics-router/edge

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/analytics-router/edge
          environment:      production
          secrets: |
            INTERNAL_API_KEY
            ORIGIN_URL
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          ORIGIN_URL:       ${{ secrets.ANALYTICS_ORIGIN_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to VPS via SSH
  # Pulls latest code, rebuilds Docker images, runs migrations inside container
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Increase timeout for docker build (can take 5-10 min first run)
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐳 Building Docker images..."
            docker compose build

            echo "🚀 Starting / updating services..."
            docker compose up -d

            echo "🗄️ Running database migrations..."
            # Wait for postgres to be fully ready
            sleep 5
            docker compose exec -T api npx prisma migrate deploy \
              --schema=../../packages/database/prisma/schema.prisma

            echo "🧹 Cleaning up unused images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            docker compose ps
