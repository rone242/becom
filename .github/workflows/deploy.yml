name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Validate (runs on every push)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build all apps (API + Web + Analytics Router)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL:                        ${{ secrets.DATABASE_URL }}
          DIRECT_URL:                          ${{ secrets.DIRECT_URL }}
          JWT_SECRET:                          ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET:                     ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL:                        ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_API_URL:                 ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ANALYTICS_ROUTER_URL:    ${{ secrets.NEXT_PUBLIC_ANALYTICS_ROUTER_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER:         ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_GTM_ID:                  ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          SERVER_API_URL:                      ${{ secrets.SERVER_API_URL }}
          SERVER_ANALYTICS_ROUTER_URL:         ${{ secrets.SERVER_ANALYTICS_ROUTER_URL }}
          INTERNAL_API_KEY:                    ${{ secrets.INTERNAL_API_KEY }}
          R2_ACCOUNT_ID:                       ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:                    ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:                ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:                      ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:                       ${{ secrets.R2_PUBLIC_URL }}
          REDIS_URL:                           ${{ secrets.REDIS_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Run DB Migrations against Neon DB
  # Uses DIRECT_URL (non-pooled) so Prisma can run DDL statements
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations (Neon)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        # 'migrate deploy' applies pending migrations safely — never resets data
        # Uses DIRECT_URL (non-pooled connection) for reliable DDL execution
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy Cloudflare Worker (Edge Layer)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-edge:
    name: Deploy Edge Worker (Cloudflare)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install edge worker dependencies
        run: npm ci
        working-directory: apps/analytics-router/edge

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/analytics-router/edge
          environment:      production
          secrets: |
            INTERNAL_API_KEY
            ORIGIN_URL
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          ORIGIN_URL:       ${{ secrets.ANALYTICS_ORIGIN_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy API to Railway
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    needs: [migrate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_API_SERVICE_ID }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Deploy Analytics Router to Railway
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-analytics:
    name: Deploy Analytics Router (Railway)
    runs-on: ubuntu-latest
    needs: [migrate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Analytics Router service
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_ANALYTICS_SERVICE_ID }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Deploy Web (Next.js) to Railway
  # Runs AFTER API is deployed so NEXT_PUBLIC_API_URL resolves correctly
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web (Railway)
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-analytics]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Web service
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_WEB_SERVICE_ID }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
