name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Type-check (runs on every push)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Build all apps (API + Web + Analytics Router)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          DIRECT_URL:               ${{ secrets.DATABASE_URL }}
          JWT_SECRET:               ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET:          ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL:             ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_API_URL:      ${{ secrets.NEXT_PUBLIC_API_URL }}
          SERVER_API_URL:           ${{ secrets.SERVER_API_URL }}
          INTERNAL_API_KEY:         ${{ secrets.INTERNAL_API_KEY }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy Cloudflare Worker (Edge Layer)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-edge:
    name: Deploy Edge Worker (Cloudflare)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install edge worker dependencies
        run: npm ci
        working-directory: apps/analytics-router/edge

      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:         ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/analytics-router/edge
          environment:      production
          secrets: |
            INTERNAL_API_KEY
            ORIGIN_URL
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          ORIGIN_URL:       ${{ secrets.ANALYTICS_ORIGIN_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy Docker Stack to VPS
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy Docker Stack (VPS)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          timeout:  300s
          script: |
            set -e
            echo "📦 Pulling latest code..."
            cd /opt/becom
            git pull origin main

            echo "🐳 Building and starting containers..."
            docker compose up -d --build api web analytics-router

            echo "🗃️  Running DB migration..."
            docker compose exec -T api npx prisma db push \
              --schema=packages/database/prisma/schema.prisma \
              --skip-generate

            echo "✅ Deployment complete!"
            docker compose ps
