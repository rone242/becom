services:
  postgres:
    image: postgres:16
    container_name: becom-postgres
    restart: always
    ports:
      - "5432:5432"
    networks:
      - becom-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: becom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready confirms postgres is accepting connections — not just started
      test: ["CMD-SHELL", "pg_isready -U postgres -d becom"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: becom-redis
    restart: always
    networks:
      - becom-network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: becom-api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - becom-network
    environment:
      NODE_ENV: production
      PORT: 4000
      # connect_timeout + pool_timeout: survive transient postgres restarts
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/becom?schema=public&connect_timeout=10&pool_timeout=30
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/becom?schema=public&connect_timeout=10
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STORAGE_DRIVER: cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dm2hs7opu}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-322451681558681}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-PehU2ZFY4YS0_sy5E115jGnQ7V8}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_ANALYTICS_ROUTER_URL: ${NEXT_PUBLIC_ANALYTICS_ROUTER_URL:-http://localhost:4001/api}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-8801712345678}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
    container_name: becom-web
    restart: unless-stopped
    depends_on:
      - api
      - analytics-router
    ports:
      - "3000:3000"
    networks:
      - becom-network
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-nextauth-secret-key-32chars}
      SERVER_API_URL: http://api:4000/api
      SERVER_ANALYTICS_ROUTER_URL: http://analytics-router:5001/api
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-af48a880f6058d28206687c6f6011b2cc863ab080c5ba6ffc2e52f8ce3ab4038}

  analytics-router:
    build:
      context: .
      dockerfile: apps/analytics-router/Dockerfile
    container_name: becom-analytics-router
    restart: unless-stopped
    env_file:
      - apps/analytics-router/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:5001"
    networks:
      - becom-network
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/becom?schema=public&connect_timeout=10&pool_timeout=30
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/becom?schema=public&connect_timeout=10
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-production}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-af48a880f6058d28206687c6f6011b2cc863ab080c5ba6ffc2e52f8ce3ab4038}
      VIP_PURCHASE_MILESTONE: ${VIP_PURCHASE_MILESTONE:-10}
      INTEGRATION_CACHE_TTL: ${INTEGRATION_CACHE_TTL:-3600}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  becom-network:
    driver: bridge

volumes:
  postgres_data:
