services:
  postgres:
    image: postgres:16
    container_name: becom-postgres
    restart: always
    # Port not exposed publicly — services communicate via Docker internal network
    networks:
      - becom-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: becom
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: becom-redis
    restart: always
    # Port not exposed publicly — services communicate via Docker internal network
    networks:
      - becom-network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: becom-api
    restart: unless-stopped
    # সতর্কতা: apps/api/.env ফাইলে REDIS_URL=redis://redis:6379 হতে হবে, localhost নয়
    env_file:
      - apps/api/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    networks:
      - becom-network
    volumes:
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${NEXTAUTH_URL}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_UPLOAD_DIR: /app/uploads
      LOCAL_PUBLIC_URL: ${LOCAL_PUBLIC_URL:-http://91.108.105.135:4000/uploads}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be build ARGs — Next.js bakes them into the
        # static bundle at build time. Runtime environment vars have no effect.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ANALYTICS_ROUTER_URL: ${NEXT_PUBLIC_ANALYTICS_ROUTER_URL}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
    container_name: becom-web
    restart: unless-stopped
    depends_on:
      - api
      - analytics-router
    ports:
      - "3000:3000"
    networks:
      - becom-network
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Server-side internal URLs — SSR calls go through Docker network
      SERVER_API_URL: http://becom-api:4000/api
      SERVER_ANALYTICS_ROUTER_URL: http://becom-analytics-router:5001/api
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}

  analytics-router:
    build:
      context: .
      dockerfile: apps/analytics-router/Dockerfile
    container_name: becom-analytics-router
    restart: unless-stopped
    env_file:
      - apps/analytics-router/.env
    depends_on:
      - postgres
      - redis
    ports:
      - "4001:5001"
    networks:
      - becom-network
    environment:
      NODE_ENV: production
      PORT: 5001
      REDIS_URL: redis://redis:6379
      VIP_PURCHASE_MILESTONE: ${VIP_PURCHASE_MILESTONE:-10}
      INTEGRATION_CACHE_TTL: ${INTEGRATION_CACHE_TTL:-3600}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  becom-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
