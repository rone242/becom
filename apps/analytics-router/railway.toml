[build]
dockerfilePath = "apps/analytics-router/Dockerfile"
watchPatterns = ["apps/analytics-router/**", "packages/**"]
context = "../.."

[deploy]
startCommand = "node apps/analytics-router/dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
